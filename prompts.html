요청 시마다 다음 구조로 제시해:
• 핵심 메시지: 이 콘텐츠가 시청자에게 전달할 한 문장
• [가치1] 반영: 이 가치가 어떻게 녹아있는지
• [가치2] 반영: 이 가치가 어떻게 녹아있는지
• [가치3] 반영: 이 가치가 어떻게 녹아있는지
• 실행 가이드: [가장 어려운 부분]을 해결할 구체적 팁

💡 이 프롬프트가 자기 자신을 직원한테 알려주는 좋은 프롬프트니까 저장해둬!`
            }
        ];

        // 소모임 접근 체크
        function checkAccess() {
            const urlParams = new URLSearchParams(window.location.search);
            const fromSomoim = urlParams.get('from') === 'somoim';
            const fromKakao = urlParams.get('from') === 'kakao';
            const hasAccess = localStorage.getItem('somoim_access') === 'true';
            
            // 소모임이나 카카오에서 온 경우
            if (fromSomoim || fromKakao) {
                localStorage.setItem('somoim_access', 'true');
                localStorage.setItem('access_time', Date.now());
                return true;
            }
            
            // 이미 접근 권한이 있는 경우 (7일 유지)
            if (hasAccess) {
                const accessTime = parseInt(localStorage.getItem('access_time') || '0');
                const now = Date.now();
                const daysPassed = (now - accessTime) / (1000 * 60 * 60 * 24);
                
                if (daysPassed < 7) {
                    return true;
                }
            }
            
            return false;
        }

        function renderPrompts() {
            const grid = document.getElementById('promptsGrid');
            grid.innerHTML = prompts.map(prompt => `
                <div class="prompt-card" onclick="openPrompt(${prompt.id})">
                    <div class="prompt-icon">${prompt.icon}</div>
                    <div class="prompt-title">${prompt.title}</div>
                    <div class="prompt-desc">${prompt.description}</div>
                </div>
            `).join('');
        }

        function openPrompt(id) {
            const prompt = prompts.find(p => p.id === id);
            if (!prompt) return;

            document.getElementById('modalTitle').textContent = prompt.icon + ' ' + prompt.title;
            document.getElementById('modalBody').innerHTML = `
                <p style="color: #666; margin-bottom: 20px;">${prompt.description}</p>
                <div class="prompt-content">${prompt.content}</div>
                <button class="btn-copy" onclick="copyPrompt(${id})">
                    📋 프롬프트 복사하기
                </button>
            `;
            
            document.getElementById('promptModal').classList.add('active');
        }

        function copyPrompt(id) {
            const prompt = prompts.find(p => p.id === id);
            navigator.clipboard.writeText(prompt.content).then(() => {
                alert('✅ 프롬프트가 복사되었습니다!');
                closeModal();
            });
        }

        function closeModal() {
            document.getElementById('promptModal').classList.remove('active');
        }

        document.getElementById('promptModal').addEventListener('click', (e) => {
            if (e.target.id === 'promptModal') closeModal();
        });

        // 페이지 로드 시 실행
        document.addEventListener('DOMContentLoaded', () => {
            if (checkAccess()) {
                document.getElementById('mainContent').style.display = 'block';
                renderPrompts();
            } else {
                document.getElementById('accessDenied').style.display = 'block';
            }
        });
    </script>
</body>
</html>
